name: publish-native

on:
  push:
    tags: [ v* ]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  NUGET_XMLDOC_MODE: skip
  TERM: xterm

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}

    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            arch: amd64
          - rid: linux-arm64
            os: ubuntu-24.04-arm
            arch: arm64
          - rid: osx-x64
            os: macos-15-intel
          - rid: osx-arm64
            os: macos-latest
          - rid: win-x64
            os: windows-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - name: Publish native AOT
      shell: pwsh
      run: |
        dotnet publish src/LocalSqsSnsMessaging.Server/ `
          -c Release `
          -r ${{ matrix.rid }} `
          -p:PublishAot=true `
          -o ./publish

    - name: Package (tar.gz)
      if: runner.os != 'Windows'
      shell: pwsh
      run: |
        tar -czf "local-sqs-sns-${{ matrix.rid }}.tar.gz" -C ./publish .

    - name: Package (zip)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath "local-sqs-sns-${{ matrix.rid }}.zip"

    - name: Attest artifacts
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      if: |
        github.event.repository.fork == false &&
        startsWith(github.ref, 'refs/tags/v')
      with:
        subject-path: local-sqs-sns-${{ matrix.rid }}.*

    - name: Upload artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: local-sqs-sns-${{ matrix.rid }}
        path: local-sqs-sns-${{ matrix.rid }}.*
        if-no-files-found: error

    - name: Log in to GitHub Container Registry
      if: |
        matrix.arch != '' &&
        github.event.repository.fork == false &&
        startsWith(github.ref, 'refs/tags/v')
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish container image
      if: |
        matrix.arch != '' &&
        github.event.repository.fork == false &&
        startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        $version = '${{ github.ref_name }}'.TrimStart('v')
        dotnet publish src/LocalSqsSnsMessaging.Server/ `
          -c Release `
          -r ${{ matrix.rid }} `
          -p:PublishAot=true `
          -p:PublishContainer=true `
          -p:ContainerRegistry=ghcr.io `
          -p:ContainerImageTag="$version-${{ matrix.arch }}" `
          /t:PublishContainer

  release:
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event.repository.fork == false &&
      startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:

    - name: Download all artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: ./artifacts
        merge-multiple: true

    - name: Attach to GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
      run: |
        $tag = $env:GITHUB_REF_NAME
        $files = Get-ChildItem ./artifacts -File | ForEach-Object { $_.FullName }
        gh release upload $tag @files --repo ${{ github.repository }} --clobber

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event.repository.fork == false &&
      startsWith(github.ref, 'refs/tags/v')

    permissions:
      packages: write

    steps:

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create multi-arch manifest
      shell: bash
      run: |
        version="${GITHUB_REF_NAME#v}"
        base="ghcr.io/justeattakeaway/local-sqs-sns"

        for tag in "${version}" "${version%.*}" "${version%%.*}" "latest"; do
          docker buildx imagetools create \
            --tag "${base}:${tag}" \
            "${base}:${version}-amd64" \
            "${base}:${version}-arm64"
        done
